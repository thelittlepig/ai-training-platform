<h2>平台页面结构</h2>
<p class="subtitle">深色专业风 · 整体导航与页面组织</p>

<div style="display:flex;flex-direction:column;gap:20px">

  <!-- Nav mockup -->
  <div class="mockup">
    <div class="mockup-header">顶部导航栏（所有用户可见）</div>
    <div class="mockup-body" style="background:#0f172a;padding:14px 24px;display:flex;align-items:center;gap:24px;border-radius:6px">

      <div style="display:flex;gap:16px;flex:1">

        <span style="color:#94a3b8;font-size:13px">资源库</span>

        <div style="background:#0369a1;color:#e0f2fe;padding:5px 14px;border-radius:4px;font-size:12px">申请注册</div>
      </div>
    </div>
  </div>

  <!-- Page map -->
  <div class="mockup">
    <div class="mockup-header">页面地图</div>
    <div class="mockup-body" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:16px">

      <div style="background:#1e293b;border-radius:8px;padding:14px;border-left:3px solid #38bdf8">
        <div style="color:#38bdf8;font-size:11px;font-weight:700;margin-bottom:8px">公开页面</div>
        <div style="color:#e2e8f0;font-size:12px;line-height:2">🏠 首页 / Landing<br>📚 课程列表<br>📄 课程详情<br>📦 资源库<br>🔐 登录 / 注册申请</div>

      <div style="background:#1e293b;border-radius:8px;padding:14px;border-left:3px solid #6366f1">
        <div style="color:#a5b4fc;font-size:11px;font-weight:700;margin-bottom:8px">学员页面（登录后）</div>
        <div style="color:#e2e8f0;font-size:12px;line-height:2">🎓 我的学习<br>📋 课程章节阅读<br>⬇️ 资源下载<br>👤 个人中心</div>

        <div style="color:#fcd34d;font-size:11px;font-weight:700;margin-bottom:8px">管理后台（Admin/Instructor）</div>
